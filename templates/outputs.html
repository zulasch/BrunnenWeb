{% extends "base.html" %}
{% block content %}

<div class="flex items-center gap-3 mb-7">
  <div class="w-8 h-8 rounded-lg bg-sky-500/20 flex items-center justify-center">
    <span class="text-lg">⚡</span>
  </div>
  <h2 class="text-xl font-bold text-white">MOSFET-Ausgänge</h2>
  <span class="ml-auto text-xs text-slate-500 bg-slate-800 border border-slate-700 px-3 py-1 rounded-full">
    Aktualisierung alle 5 s
  </span>
</div>

<!-- Kanal-Karten -->
<div id="outputsGrid"
     class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
</div>

<!-- Kanalnamen bearbeiten -->
<div class="bg-slate-800 border border-slate-700 p-6 rounded-xl shadow-lg max-w-3xl mx-auto mb-8">
  <h3 class="text-base font-semibold text-sky-400 mb-5 flex items-center gap-2">
    <span>🏷️</span> Kanalnamen bearbeiten
  </h3>
  <form id="namesForm" class="grid md:grid-cols-2 gap-4"></form>
  <button type="submit" form="namesForm"
          class="mt-5 w-full bg-sky-600 hover:bg-sky-500 text-white font-semibold py-2.5 rounded-lg transition text-sm shadow-lg shadow-sky-900/20">
    💾 Namen speichern
  </button>
  <p id="namesMsg" class="text-center mt-3 text-sm hidden"></p>
</div>

<!-- Zeitsteuerung -->
<div class="bg-slate-800 border border-slate-700 p-6 rounded-xl shadow-lg max-w-5xl mx-auto">
  <h3 class="text-base font-semibold text-sky-400 mb-5 flex items-center gap-2">
    <span>⏰</span> Zeitsteuerung
  </h3>

  <!-- Formular -->
  <form id="scheduleForm" class="grid sm:grid-cols-4 gap-3 mb-6">
    <select name="channel" id="schedChannel" class="border rounded-lg px-3 py-2">
      {% for i in range(6) %}
        <option value="{{ i }}">Kanal {{ i+1 }}</option>
      {% endfor %}
    </select>
    <input name="time" type="time" required class="border rounded-lg px-3 py-2" />
    <select name="state" class="border rounded-lg px-3 py-2">
      <option value="1">Einschalten</option>
      <option value="0">Ausschalten</option>
    </select>
    <button type="submit"
            class="bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg transition py-2 col-span-full sm:col-span-1 font-semibold text-sm">
      ➕ Hinzufügen
    </button>
  </form>

  <!-- Tabelle -->
  <div class="overflow-x-auto rounded-xl border border-slate-700">
    <table class="min-w-full text-sm" id="scheduleTable">
      <thead class="bg-slate-700/60 text-slate-300">
        <tr class="border-b border-slate-700">
          <th class="px-4 py-3 text-left font-medium">Kanal</th>
          <th class="px-4 py-3 text-left font-medium">Zeit</th>
          <th class="px-4 py-3 text-left font-medium">Aktion</th>
          <th class="px-4 py-3 text-left font-medium"></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let channelNames = {};

async function loadStates() {
  try {
    const [stateRes, nameRes] = await Promise.all([
      fetch("/outputs/state"),
      fetch("/outputs/names")
    ]);
    const states = await stateRes.json();
    channelNames = await nameRes.json();

    const grid = document.getElementById("outputsGrid");
    grid.innerHTML = "";

    states.forEach((on, i) => {
      const label = channelNames[i] || `Kanal ${i + 1}`;

      const card = document.createElement("div");
      card.className = on
        ? "bg-slate-800 border border-emerald-600/50 rounded-xl shadow-lg p-5 relative text-center transition hover:shadow-emerald-900/20"
        : "bg-slate-800 border border-slate-700 rounded-xl shadow-lg p-5 relative text-center transition";

      card.innerHTML = `
        <div class="flex items-center justify-between mb-4">
          <h4 class="font-semibold text-sm text-slate-200 text-left">${label}</h4>
          <span class="w-2.5 h-2.5 rounded-full ${on ? 'bg-emerald-400 shadow-lg shadow-emerald-400/50' : 'bg-slate-600'}"></span>
        </div>
        <button onclick="toggle(${i}, ${on ? 0 : 1})"
                class="w-full py-2.5 rounded-lg text-sm font-semibold transition
                       ${on
                          ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-900/30'
                          : 'bg-slate-700 hover:bg-slate-600 text-slate-300'}">
          ${on ? '⏹ Ausschalten' : '▶ Einschalten'}
        </button>
        <p class="mt-2.5 text-xs ${on ? 'text-emerald-400' : 'text-slate-500'} font-medium">
          ${on ? 'Aktiv' : 'Inaktiv'}
        </p>
      `;
      grid.appendChild(card);
    });

  } catch (err) {
    document.getElementById("outputsGrid").innerHTML =
      `<div class='col-span-3 text-center text-rose-400 py-8'>⚠️ Fehler beim Laden: ${err}</div>`;
  }
}

async function toggle(channel, state) {
  await fetch(`/outputs/set/${channel}/${state}`, { method: "POST" });
  loadStates();
}

/* Namen bearbeiten */
async function loadNamesForm() {
  const res = await fetch("/outputs/names");
  const data = await res.json();
  const form = document.getElementById("namesForm");
  form.innerHTML = "";
  Object.keys(data).forEach(k => {
    form.innerHTML += `
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Kanal ${parseInt(k)+1}</label>
        <input name="${k}" value="${data[k]}" class="border rounded-lg px-3 py-2 w-full text-sm">
      </div>`;
  });
}

document.getElementById("namesForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const res = await fetch("/outputs/names", { method: "POST", body: formData });
  const msg = document.getElementById("namesMsg");
  msg.classList.remove("hidden");
  msg.textContent = res.ok ? "✅ Gespeichert" : "❌ Fehler";
  msg.className = res.ok
    ? "block text-emerald-400 text-sm mt-3"
    : "block text-rose-400 text-sm mt-3";
  setTimeout(() => msg.classList.add("hidden"), 2500);
  loadStates();
});

/* Zeitplan */
async function loadSchedule() {
  const res = await fetch("/outputs/schedule");
  const data = await res.json();
  const tbody = document.querySelector("#scheduleTable tbody");
  tbody.innerHTML = "";
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="4" class="text-center px-4 py-6 text-slate-500">Kein Zeitplan vorhanden</td></tr>`;
    return;
  }
  data.forEach(j => {
    const name = channelNames[j.channel] || `Kanal ${parseInt(j.channel)+1}`;
    const actionClass = j.state ? "text-emerald-400" : "text-slate-400";
    const action = j.state ? "▶ EIN" : "⏹ AUS";
    const row = document.createElement("tr");
    row.className = "border-b border-slate-700/50 hover:bg-slate-700/30 transition";
    row.innerHTML = `
      <td class="px-4 py-3 text-slate-200">${name}</td>
      <td class="px-4 py-3 font-mono text-slate-300">${j.time}</td>
      <td class="px-4 py-3 ${actionClass} font-medium">${action}</td>
      <td class="px-4 py-3">
        <button class="text-rose-400 hover:text-rose-300 transition text-xs font-medium"
                onclick="deleteSchedule(${j.channel},'${j.time}')">
          🗑 Löschen
        </button>
      </td>`;
    tbody.appendChild(row);
  });
}

async function deleteSchedule(channel, time) {
  await fetch(`/outputs/schedule?channel=${channel}&time=${time}`, { method: "DELETE" });
  loadSchedule();
}

document.getElementById("scheduleForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  await fetch("/outputs/schedule", { method: "POST", body: formData });
  loadSchedule();
});

loadStates();
loadNamesForm();
loadSchedule();
setInterval(loadStates, 5000);
</script>
{% endblock %}
