{% extends "base.html" %}
{% block content %}

<div class="flex items-center gap-3 mb-6">
  <div class="w-8 h-8 rounded-lg bg-sky-500/20 flex items-center justify-center">
    <span class="text-lg">🗄️</span>
  </div>
  <h1 class="text-xl font-bold text-white">InfluxDB-Konfiguration</h1>
</div>

<div id="messageBox" class="hidden mb-5"></div>

<div class="bg-slate-800 border border-slate-700 rounded-xl shadow-lg p-6 max-w-2xl">
  <form method="post" class="space-y-5">
    {% for key, value in config.items() %}
    <div>
      <label class="block text-sm font-medium text-slate-300 mb-1">{{ key }}</label>
      <input name="{{ key }}" value="{{ value }}"
        class="border rounded-lg px-3 py-2 w-full text-sm font-mono" />
      <p class="text-xs text-slate-500 mt-1">{{ descriptions[key] }}</p>
    </div>
    {% endfor %}

    <div class="pt-2">
      <button type="submit"
        class="bg-sky-600 hover:bg-sky-500 text-white font-semibold px-8 py-2.5 rounded-lg transition text-sm shadow-lg shadow-sky-900/20">
        💾 Speichern
      </button>
    </div>
  </form>
</div>

{% endblock %}
