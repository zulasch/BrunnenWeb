{% extends "base.html" %}
{% block content %}

<div class="flex items-center gap-3 mb-6">
  <div class="w-8 h-8 rounded-lg bg-sky-500/20 flex items-center justify-center">
    <span class="text-lg">📋</span>
  </div>
  <h2 class="text-xl font-bold text-white">Logs</h2>
</div>

<!-- Log-Level -->
<div class="bg-slate-800 border border-slate-700 rounded-xl shadow-lg p-5 mb-5">
  <h3 class="text-sm font-semibold text-sky-400 mb-3">Logging-Level für den Logger</h3>
  <p class="text-xs text-slate-500 mb-4">
    Aktuell: <span id="logLevelCurrent" class="text-slate-300 font-semibold">{{ current_level }}</span>
  </p>
  <div class="flex flex-col sm:flex-row sm:items-center gap-3">
    <select id="logLevelSelect" class="border rounded-lg px-3 py-2 text-sm w-full sm:w-auto">
      <option value="ERROR"   {% if current_level == "ERROR"   %}selected{% endif %}>Nur Fehler</option>
      <option value="WARNING" {% if current_level == "WARNING" %}selected{% endif %}>Warnungen + Fehler</option>
      <option value="INFO"    {% if current_level == "INFO"    %}selected{% endif %}>Infos</option>
      <option value="DEBUG"   {% if current_level == "DEBUG"   %}selected{% endif %}>Debug</option>
    </select>
    <button type="button" onclick="updateLogLevel()"
      class="bg-sky-600 hover:bg-sky-500 text-white font-semibold px-5 py-2 rounded-lg transition text-sm">
      Speichern
    </button>
    <span id="logLevelStatus" class="text-xs text-slate-500"></span>
  </div>
</div>

<!-- Datei-Auswahl -->
<div class="bg-slate-800 border border-slate-700 rounded-xl shadow-lg p-5 mb-5">
  <form class="flex items-center gap-3">
    <label class="text-sm font-medium text-slate-300">Datei:</label>
    <select name="file" onchange="this.form.submit()" class="border rounded-lg px-3 py-2 text-sm flex-1 max-w-xs">
      {% for name in files %}
        <option value="{{ name }}" {% if name == chosen %}selected{% endif %}>{{ name }}</option>
      {% endfor %}
    </select>
  </form>
</div>

<!-- Log-Ausgabe (Terminal-Style) -->
<div class="bg-slate-800 border border-slate-700 rounded-xl shadow-lg overflow-hidden">
  <div class="flex items-center gap-2 px-4 py-3 border-b border-slate-700 bg-slate-700/30">
    <span class="w-3 h-3 rounded-full bg-rose-500/60"></span>
    <span class="w-3 h-3 rounded-full bg-amber-500/60"></span>
    <span class="w-3 h-3 rounded-full bg-emerald-500/60"></span>
    <span class="ml-2 text-xs text-slate-500 font-mono">{{ chosen }}</span>
  </div>
  <pre class="bg-slate-900/80 text-green-400 p-5 overflow-auto font-mono text-xs leading-relaxed"
       style="max-height: 65vh;">{{ content }}</pre>
</div>

<script>
async function updateLogLevel() {
  const select = document.getElementById("logLevelSelect");
  const status = document.getElementById("logLevelStatus");
  const current = document.getElementById("logLevelCurrent");
  status.textContent = "Speichere...";
  try {
    const res = await fetch("/logs/level", {
      method: "POST",
      headers: {"Content-Type": "application/x-www-form-urlencoded"},
      body: `level=${encodeURIComponent(select.value)}`
    });
    const data = await res.json();
    if (res.ok && data.success) {
      current.textContent = data.level || select.value;
      status.textContent = data.message || "Gespeichert.";
      status.className = "text-xs text-emerald-400";
    } else {
      status.textContent = data.message || "Fehler beim Speichern.";
      status.className = "text-xs text-rose-400";
    }
  } catch (err) {
    status.textContent = `Fehler: ${err}`;
    status.className = "text-xs text-rose-400";
  }
}
</script>
{% endblock %}
