{% extends "base.html" %}
{% block content %}

<div class="flex items-center gap-3 mb-6">
  <div class="w-8 h-8 rounded-lg bg-sky-500/20 flex items-center justify-center">
    <span class="text-lg">💧</span>
  </div>
  <h2 class="text-xl font-bold text-white">Wasserzähler (Reedkontakte)</h2>
  <span class="ml-auto text-xs text-slate-500 bg-slate-800 border border-slate-700 px-3 py-1 rounded-full">
    Aktualisierung alle 5 s
  </span>
</div>

<div id="messageBox" class="hidden mb-5"></div>

<!-- Zähler-Karten -->
<div id="reedGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-6">
  <div class="text-center text-slate-500 col-span-2 py-10 animate-pulse">Lade Zählerstände...</div>
</div>

<!-- Hinweis -->
<div class="bg-sky-900/20 border border-sky-700/40 rounded-xl p-4 text-sm text-sky-300 flex gap-3">
  <span class="shrink-0 mt-0.5">ℹ️</span>
  <span>
    Der Zählerstand wird persistent gespeichert und überlebt einen Neustart.
    Liter pro Impuls kann unter
    <a href="/" class="underline font-semibold text-sky-400 hover:text-sky-300">Konfiguration → Wasserzähler</a>
    eingestellt werden.
  </span>
</div>

<script>
async function loadReed() {
  try {
    const res = await fetch('/api/reed');
    const data = await res.json();
    const grid = document.getElementById('reedGrid');
    grid.innerHTML = '';

    data.forEach(z => {
      const card = document.createElement('div');
      card.className = 'bg-slate-800 border border-sky-700/40 rounded-xl shadow-lg p-6';
      card.innerHTML = `
        <div class="flex items-start justify-between mb-5">
          <div>
            <h3 class="text-base font-bold text-white">${z.name}</h3>
            <p class="text-xs text-slate-500 mt-1">GPIO ${z.gpio} &nbsp;&middot;&nbsp; ${z.liter_pro_impuls} L/Impuls</p>
          </div>
          <div class="w-10 h-10 rounded-xl bg-sky-500/15 flex items-center justify-center text-xl shrink-0">🌊</div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-5">
          <div class="bg-slate-700/40 border border-slate-600/50 rounded-xl p-4 text-center">
            <p class="text-xs text-slate-400 mb-1">Gesamtvolumen</p>
            <p class="text-2xl font-bold text-sky-400">${z.liter.toFixed(2)}</p>
            <p class="text-xs text-slate-500 mt-1">Liter</p>
          </div>
          <div class="bg-slate-700/40 border border-slate-600/50 rounded-xl p-4 text-center">
            <p class="text-xs text-slate-400 mb-1">Impulse gesamt</p>
            <p class="text-2xl font-bold text-slate-200">${z.impulse}</p>
            <p class="text-xs text-slate-500 mt-1">Impulse</p>
          </div>
        </div>

        <button onclick="resetCounter(${z.gpio}, '${z.name}')"
          class="w-full py-2 rounded-lg bg-rose-900/30 border border-rose-700/40 text-rose-400 hover:bg-rose-900/50 hover:text-rose-300 font-medium transition text-sm">
          🔄 Zähler zurücksetzen
        </button>
      `;
      grid.appendChild(card);
    });

  } catch (err) {
    document.getElementById('reedGrid').innerHTML =
      `<div class="col-span-2 text-center text-rose-400 py-10">⚠️ Fehler beim Laden: ${err}</div>`;
  }
}

async function resetCounter(gpio, name) {
  if (!confirm(`Zähler „${name}" wirklich auf 0 zurücksetzen?`)) return;
  const box = document.getElementById('messageBox');
  try {
    const res = await fetch(`/reed/reset/${gpio}`, { method: 'POST' });
    const data = await res.json();
    box.classList.remove('hidden');
    box.textContent = data.message;
    box.className = data.success
      ? 'p-3 rounded-lg bg-emerald-900/40 border border-emerald-700 text-emerald-300 text-sm mb-5'
      : 'p-3 rounded-lg bg-rose-900/40 border border-rose-700 text-rose-300 text-sm mb-5';
    setTimeout(() => box.classList.add('hidden'), 4000);
    setTimeout(loadReed, 500);
  } catch (err) {
    box.classList.remove('hidden');
    box.textContent = '❌ Fehler: ' + err;
    box.className = 'p-3 rounded-lg bg-rose-900/40 border border-rose-700 text-rose-300 text-sm mb-5';
  }
}

loadReed();
setInterval(loadReed, 5000);
</script>
{% endblock %}
