<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "BrunnenWeb" }}</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #0f172a;
      color: #f1f5f9;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Nav active/hover underline */
    .nav-link {
      position: relative;
      transition: color 0.15s, background 0.15s;
    }
    .nav-link.active {
      color: #38bdf8 !important;
      background-color: rgba(56, 189, 248, 0.08) !important;
    }

    /* Animated header accent line */
    .header-accent {
      background: linear-gradient(90deg, #0ea5e9, #06b6d4, #34d399, #0ea5e9);
      background-size: 300% 100%;
      animation: shimmer 5s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* Form inputs dark style (global) */
    input:not([type=checkbox]):not([type=radio]),
    select,
    textarea {
      background-color: #1e293b !important;
      border-color: #475569 !important;
      color: #f1f5f9 !important;
      font-size: 0.9375rem;
    }
    input:not([type=checkbox]):not([type=radio]):focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #38bdf8 !important;
      box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
    }
    input::placeholder, textarea::placeholder {
      color: #64748b !important;
    }
    option {
      background-color: #1e293b;
      color: #f1f5f9;
    }

    @media (max-width: 640px) {
      h1, h2, h3 { font-size: 1.2rem; }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-slate-800 border-b border-slate-700 shadow-xl sticky top-0 z-50">
    <!-- Accent line -->
    <div class="header-accent h-0.5"></div>

    <div class="container mx-auto px-4 py-3 flex items-center justify-between">

      <!-- Logo -->
      <a href="/" class="flex items-center space-x-3 group">
        <div class="w-9 h-9 rounded-lg bg-sky-500 flex items-center justify-center shadow-lg shadow-sky-500/25 group-hover:bg-sky-400 transition">
          <span class="text-base">💧</span>
        </div>
        <div>
          <span class="font-bold text-white text-base leading-none block">BrunnenWeb</span>
          <span class="text-xs text-slate-500 leading-none block">Monitoring System</span>
        </div>
      </a>

      <!-- Mobile menu button -->
      <button id="menuBtn" class="md:hidden text-slate-400 hover:text-white focus:outline-none p-2 rounded-lg hover:bg-slate-700 transition">
        <svg id="menuIconOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg id="menuIconClose" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <!-- Navigation -->
      <nav id="menu" class="hidden md:flex flex-col md:flex-row md:items-center absolute md:static top-16 left-0 w-full md:w-auto bg-slate-800 md:bg-transparent border-t md:border-0 border-slate-700 z-50 p-3 md:p-0 shadow-xl md:shadow-none gap-0.5 md:gap-0 md:space-x-0.5">
        <a href="/" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Konfiguration</a>
        <a href="/database" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Datenbank</a>
        <a href="/measurements" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Messwerte</a>
        <a href="/barometer" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Barometer</a>
        <a href="/outputs" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Outputs</a>
        <a href="/reed" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Wasserzähler</a>
        <a href="/systemstatus" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">System</a>
        <a href="/service" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Dienste</a>
        <a href="/backup" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Backup</a>
        <a href="/logs" class="nav-link px-3 py-2 rounded-lg text-sm text-slate-400 hover:text-white hover:bg-slate-700/60 transition block">Logs</a>
        <div class="md:ml-1 md:pl-1 md:border-l md:border-slate-700 mt-1 md:mt-0">
          <a href="/logout" class="nav-link px-3 py-2 rounded-lg text-sm text-rose-400 hover:text-rose-300 hover:bg-rose-900/20 transition block">Abmelden</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="flex-1 container mx-auto mt-6 mb-12 px-4 sm:px-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-slate-600 text-xs py-4 border-t border-slate-800">
    © 2025 BrunnenWeb &ndash; Raspberry Pi Messsystem
  </footer>

  <script>
    // Mobile menu toggle
    const menuBtn = document.getElementById("menuBtn");
    const menu = document.getElementById("menu");
    const iconOpen = document.getElementById("menuIconOpen");
    const iconClose = document.getElementById("menuIconClose");

    menuBtn.addEventListener("click", () => {
      const isHidden = menu.classList.contains("hidden");
      menu.classList.toggle("hidden", !isHidden);
      menu.classList.toggle("flex", isHidden);
      iconOpen.classList.toggle("hidden", isHidden);
      iconClose.classList.toggle("hidden", !isHidden);
    });

    // Active nav link highlight
    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-link').forEach(link => {
      const href = link.getAttribute('href');
      if (href && (href === currentPath || (href !== '/' && currentPath.startsWith(href)))) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
